<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axopar 29 CCX · 2027 — Build</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#0b0c0e;--muted:#73767c;--line:#e6e7e9;--bg:#ffffff;--card:#ffffff;--brand:#1878F8;--brandd:#0f5fd0;--warn:#9a6700;--warnbg:#fff7e6;--ok:#0f7a52}
*{box-sizing:border-box}
body{margin:0;font-family:"Archivo",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
.wrap{max-width:860px;margin:0 auto;padding:0 16px 150px}
.hero{text-align:center;padding:20px 0 4px}
.hero:empty{display:none}
.heroimg{max-width:100%;max-height:230px;width:auto;display:inline-block}
header.bar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line)}
.barin{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 18px;max-width:860px;margin:0 auto}
.brand{display:flex;align-items:center;gap:14px;min-width:0}
.brand img{height:36px;width:auto;display:block}
.brand .tt{min-width:0}
.barin h1{font-size:15px;margin:0;font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.barin .sub{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.09em}
.tot{text-align:right;white-space:nowrap}
.tot .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.11em}
.tot .val{font-size:22px;font-weight:800;color:var(--brand);letter-spacing:-.01em}
.sec{background:var(--card);border:1px solid var(--line);border-radius:4px;margin:14px 0;overflow:hidden}
.sechd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px;cursor:pointer;user-select:none}
.sechd h2{font-size:13px;margin:0;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.sechd .meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:10px}
.pill{font-size:10px;color:var(--brand);background:#eaf2ff;padding:3px 9px;border-radius:2px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pill.req{color:#b3261e;background:#fdecea}
.pill.ok{color:var(--ok);background:#e6f6ee}
.fuelhint{font-size:12px;color:var(--brandd);background:#f2f7ff;padding:10px 18px;border-top:1px solid var(--line)}
.fit{display:inline-block;font-size:10px;color:var(--ok);background:#e6f6ee;border-radius:2px;padding:2px 7px;margin-left:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.footmsg{display:none;background:var(--warnbg);color:var(--warn);font-size:12px;font-weight:600;padding:8px 16px;text-align:center;border-bottom:1px solid #f0e0b0}
.sec.flash{border-color:#b3261e;box-shadow:0 0 0 2px rgba(179,38,30,.22)}
.chev{transition:transform .18s;color:var(--muted);font-size:11px}
.sec.collapsed .body{display:none}
.sec.collapsed .chev{transform:rotate(-90deg)}
.opt{display:flex;align-items:flex-start;gap:13px;padding:12px 18px;border-top:1px solid var(--line)}
.opt:hover{background:#fafafa}
.opt.sel{background:#f4f8ff}
.opt input{margin-top:2px;width:18px;height:18px;flex:0 0 auto;accent-color:var(--brand)}
.opt .nm{flex:1;font-size:14px;line-height:1.4}
.opt .note{font-size:12px;color:var(--muted);margin-top:2px}
.opt .note.req{color:var(--warn)}
.opt.sel .warn{display:block}
.opt .warn{display:none;font-size:12px;color:var(--warn);background:var(--warnbg);border-radius:3px;padding:4px 9px;margin-top:5px}
.opt .pr{font-size:14px;font-weight:700;white-space:nowrap;min-width:78px;text-align:right}
.locked{background:#f6faf6}
.foot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -1px 14px rgba(0,0,0,.05);z-index:30}
.footin{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px}
.footin .c{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.footin .t{font-size:20px;font-weight:800}
.btn{appearance:none;border:1px solid var(--brand);background:var(--brand);color:#fff;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:13px 20px;border-radius:3px;cursor:pointer}
.btn:hover{background:var(--brandd);border-color:var(--brandd)}
.btn.ghost{background:#fff;color:var(--ink);border-color:#cfd2d6}
.btn.ghost:hover{background:#f5f5f5;border-color:var(--ink)}
.btn:active{transform:scale(.98)}
.modal{position:fixed;inset:0;background:rgba(10,12,14,.5);z-index:50;display:none;overflow:auto}
.modal.open{display:block}
.sheet{background:#fff;max-width:760px;margin:24px auto;border-radius:4px;padding:24px}
.sheet h2{margin:0 0 2px;font-size:20px;text-transform:uppercase;letter-spacing:.03em;font-weight:800}
.sheet .ssub{color:var(--muted);font-size:13px;margin-bottom:16px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 18px}
.fields label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.fields input{width:100%;font-size:14px;padding:10px 11px;border:1px solid var(--line);border-radius:3px;font-family:inherit}
.fields input:focus{outline:none;border-color:var(--brand)}
.sumtbl{width:100%;border-collapse:collapse;font-size:13px}
.sumtbl td{padding:5px 0;vertical-align:top}
.sumtbl .scat{font-weight:700;color:var(--ink);padding-top:14px;font-size:11px;text-transform:uppercase;letter-spacing:.07em}
.sumtbl .amt{text-align:right;white-space:nowrap}
.sumtbl tr.grand td{border-top:2px solid var(--ink);font-weight:800;font-size:16px;padding-top:11px}
.acts{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.acts .btn{flex:1;min-width:150px;text-align:center}
.close{float:right;border:none;background:none;font-size:24px;color:var(--muted);cursor:pointer;line-height:1}
#sent{display:none;margin-top:14px;padding:12px 14px;border-radius:3px;font-size:14px}
#sent.ok{display:block;background:#e6f6ee;color:var(--ok);border:1px solid #b7e3cd}
#sent.err{display:block;background:var(--warnbg);color:var(--warn);border:1px solid #f0e0b0}
@media(max-width:560px){.fields{grid-template-columns:1fr}.barin h1{font-size:13px}.tot .val{font-size:18px}.brand img{height:28px}.barin .sub{display:none}}
@media print{body{background:#fff}.foot,header.bar,.wrap,.close,.acts,.fields{display:none!important}.modal,.modal .sheet{position:static;background:#fff;margin:0;display:block;max-width:100%}.modal{overflow:visible}}
.printhdr{display:none}
@media print{.printhdr{display:flex;align-items:center;gap:14px;margin-bottom:16px;border-bottom:2px solid var(--ink);padding-bottom:10px}.printhdr img{height:32px}.printhdr .pm{font-size:18px;font-weight:800;text-transform:uppercase}.printhdr .pc{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.05em}}
</style></head><body>

ropellers included"}, {"name": "Twin Mercury Verado V8 250hp, Performance Line, White", "price": 106462, "note": "Complete engine setup \u2014 pre-rig & propellers included"}, {"name": "Twin Mercury Verado V8 250hp, Performance Line, Black, JPO", "price": 135692, "note": "Complete engine setup \u2014 pre-rig & propellers included \u00b7 JPO joystick piloting"}, {"name": "Twin Mercury Verado V8 250hp, Performance Line, White, JPO", "price": 138923, "note": "Complete engine setup \u2014 pre-rig & propellers included \u00b7 JPO joystick piloting"}]}, {"name": "Logistics", "type": "multi", "options": [{"name": "Preparation for Overseas Shipping", "price": 554, "note": "Required", "default": true}]}]};
const fmt = n => '$' + Math.round(n).toLocaleString('en-US');
let sel = {};
DATA.sections.forEach((s,si)=>s.options.forEach((o,oi)=>{ if(o.default) sel[si+'_'+oi]=true; }));
let collapsedState = {};
DATA.sections.forEach((s,si)=>{ collapsedState[si] = (s.type!=='base' && si>3); });

function isReq(note){ return /required|not compatible|not available|recommended/i.test(note||''); }
function hasEngine(){ return DATA.sections.some((s,si)=> s.name==='Engine' && s.options.some((o,oi)=>sel[si+'_'+oi])); }
function engAttrs(){ let e=null; DATA.sections.forEach((s,si)=>{ if(s.name==='Engine') s.options.forEach((o,oi)=>{ if(sel[si+'_'+oi]) e=o; }); }); if(!e) return null; const l=e.name.toLowerCase(); return {name:e.name, count:/triple/.test(l)?'triple':/twin/.test(l)?'twin':null, block:/v10/.test(l)?'v10':/v8/.test(l)?'v8':/v6/.test(l)?'v6':null}; }
function fuelMatch(name){ const ea=engAttrs(); if(!ea) return null; const l=name.toLowerCase(); if(!/twin|triple|v8|v10|v6/.test(l)) return null; const cOk=!ea.count||l.includes(ea.count); const bOk=!ea.block||l.includes(ea.block); return cOk&&bOk; }
const NORM = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
const LAYOUT_SECS = ['module selection bow','module selection stern','fore deck setup','cockpit layout','main cabin layout','front cabin layout','cockpit'];
function layoutModules(){ const m=[]; DATA.sections.forEach((s,si)=>{ if(LAYOUT_SECS.includes(s.name.toLowerCase())) s.options.forEach((o,oi)=>m.push({id:si+'_'+oi,key:NORM(o.name)})); }); return m; }
function colorState(){ let toks=new Set(),selTok=null; DATA.sections.forEach((s,si)=>{ if(s.name==='Upholstery Color') s.options.forEach((o,oi)=>{ const t=NORM(o.name.trim().split(/\s+/).pop()); if(t.length>=4) toks.add(t); if(sel[si+'_'+oi]) selTok=t; }); }); return {toks,selTok}; }
function cushionVisible(oname){
  const n=NORM(oname);
  const refs=layoutModules().filter(m=>m.key.length>=5 && n.includes(m.key));   // depends on a layout module?
  if(refs.length && !refs.some(m=>sel[m.id])) return false;                       // its layout isn't selected
  const {toks,selTok}=colorState(); let col=null; toks.forEach(t=>{ if(n.includes(t)) col=t; });
  if(col && selTok && col!==selTok) return false;                                 // wrong colour for this build
  return true;
}

function render(){
  const _y = window.scrollY;
  const root = document.getElementById('secs'); root.innerHTML='';
  document.getElementById('hModel').textContent = DATA.model;
  document.getElementById('pModel').textContent = DATA.model;
  DATA.sections.forEach((s,si)=>{
    const sec=document.createElement('div'); sec.className='sec'+(collapsedState[si]?' collapsed':'');
    let opts = s.options.map((o,oi)=>({o,oi}));
    if(/cushion/i.test(s.name)) opts = opts.filter(({o,oi})=>{ const v=cushionVisible(o.name); if(!v) delete sel[si+'_'+oi]; return v; });
    const chosen=opts.filter(({oi})=>sel[si+'_'+oi]).length;
    if(opts.length===0 && s.type!=='base') return;   // e.g. cushion section with nothing relevant yet
    let pill='';
    if(s.type==='base') pill='<span class="pill">included</span>';
    else if(s.name==='Engine') pill = hasEngine()?'<span class="pill ok">selected</span>':'<span class="pill req">required</span>';
    else if(s.type==='single') pill='<span class="pill">pick one</span>';
    sec.innerHTML='<div class="sechd"><h2>'+esc(s.name)+'</h2><div class="meta">'+pill+'<span>'+chosen+(s.type==='single'?'':' / '+opts.length)+'</span><span class="chev">&#9660;</span></div></div><div class="body"></div>';
    const body=sec.querySelector('.body');
    const ea=engAttrs();
    if(s.name==='Fuel System' && ea && (ea.count||ea.block) && s.options.some(o=>/twin|triple|v8|v10/i.test(o.name))){
      const h=document.createElement('div'); h.className='fuelhint';
      h.innerHTML='&#9889; Your engine is <b>'+esc(((ea.count||'')+' '+(ea.block||'').toUpperCase()).trim())+'</b> — pick the matching fuel system below (tagged), then your region.';
      body.appendChild(h);
    }
    opts.forEach(({o,oi})=>{
      const id=si+'_'+oi, on=!!sel[id];
      const row=document.createElement('label');
      row.className='opt'+(on?' sel':'')+(s.type==='base'?' locked':'');
      const ctrl = s.type==='base' ? '<input type="checkbox" checked disabled>'
        : '<input type="'+(s.type==='single'?'radio':'checkbox')+'" '+(s.type==='single'?'name="g'+si+'"':'')+(on?' checked':'')+'>';
      const priceTxt = '<span class="pr">'+(s.type==='base'?fmt(o.price):(o.price>0?'+'+fmt(o.price):'$0'))+'</span>';
      const needsWarn = /not compatible|not available|\S+\s+required/i.test(o.note);
      const note = o.note ? '<div class="note'+(isReq(o.note)?' req':'')+'">'+esc(o.note)+'</div>' : '';
      const warn = needsWarn ? '<div class="warn">&#9888; '+esc(o.note)+'</div>' : '';
      const fm = (s.name==='Fuel System')?fuelMatch(o.name):null;
      const fit = fm===true ? '<span class="fit">&#10003; fits your engine</span>' : '';
      row.innerHTML = ctrl+'<div class="nm">'+esc(o.name)+fit+note+warn+'</div>'+priceTxt;
      const input=row.querySelector('input');
      if(s.type!=='base') input.addEventListener('change',()=>{
        if(s.type==='single'){ s.options.forEach((_,k)=>delete sel[si+'_'+k]); sel[id]=true; }
        else { if(input.checked) sel[id]=true; else delete sel[id]; }
        render(); recompute();
      });
      body.appendChild(row);
    });
    sec.querySelector('.sechd').addEventListener('click',e=>{ if(e.target.closest('.opt'))return; collapsedState[si]=!collapsedState[si]; sec.classList.toggle('collapsed'); });
    root.appendChild(sec);
  });
  recompute();
  window.scrollTo(0, _y);
}
function items(){
  const out=[];
  DATA.sections.forEach((s,si)=>s.options.forEach((o,oi)=>{ if(sel[si+'_'+oi]) out.push({cat:s.name,name:o.name,price:o.price}); }));
  return out;
}
function recompute(){
  const it=items(); const total=it.reduce((a,b)=>a+b.price,0);
  document.getElementById('hTotal').textContent=fmt(total);
  document.getElementById('fTotal').textContent=fmt(total);
  document.getElementById('fCount').textContent=it.filter(x=>DATA.sections[0].name!==x.cat).length;
  const m=document.getElementById('footMsg'); if(m && hasEngine()){ m.style.display='none'; }
}
function buildSummary(){
  const it=items(); const tbody=document.getElementById('sumBody'); tbody.innerHTML='';
  let cat=''; let total=0;
  it.forEach(x=>{
    if(x.cat!==cat){ cat=x.cat; const tr=document.createElement('tr'); tr.innerHTML='<td class="scat" colspan="2">'+esc(cat)+'</td>'; tbody.appendChild(tr); }
    total+=x.price;
    const tr=document.createElement('tr'); tr.innerHTML='<td>'+esc(x.name)+'</td><td class="amt">'+fmt(x.price)+'</td>'; tbody.appendChild(tr);
  });
  const g=document.createElement('tr'); g.className='grand'; g.innerHTML='<td>Total (USD)</td><td class="amt">'+fmt(total)+'</td>'; tbody.appendChild(g);
  return total;
}
function summaryText(){
  const it=items(); let total=0; let cat=''; let lines=[];
  it.forEach(x=>{ if(x.cat!==cat){cat=x.cat; lines.push('');lines.push('— '+cat.toUpperCase()+' —');} total+=x.price; lines.push(x.name+'  ...  '+fmt(x.price)); });
  const cust=[];
  const n=val('cName'),p=val('cPhone'),e=val('cEmail'),no=val('cNotes');
  if(n)cust.push('Name: '+n); if(p)cust.push('Phone: '+p); if(e)cust.push('Email: '+e); if(no)cust.push('Notes: '+no);
  return DATA.model+' — Build Summary\nSurdyke Marina\n'+(cust.length?'\n'+cust.join('\n')+'\n':'')+lines.join('\n')+'\n\nTOTAL (USD): '+fmt(total);
}
function val(id){return (document.getElementById(id).value||'').trim();}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function flagEngineRequired(){
  const sec=[...document.querySelectorAll('.sec')].find(s=>s.querySelector('h2').textContent==='Engine');
  if(sec){ const si=[...document.querySelectorAll('.sec')].indexOf(sec); sec.classList.remove('collapsed');
    sec.classList.add('flash'); sec.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>sec.classList.remove('flash'),1700); }
  const m=document.getElementById('footMsg'); if(m){ m.textContent='⚠ Select an engine to finish your build.'; m.style.display='block'; }
}
document.getElementById('finishBtn').onclick=()=>{
  if(!hasEngine()){ flagEngineRequired(); return; }
  buildSummary(); document.getElementById('modal').classList.add('open');
};
document.getElementById('closeBtn').onclick=document.getElementById('backBtn').onclick=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('printBtn').onclick=()=>window.print();
function mailtoFallback(){
  const cust=val('cName')?(' — '+val('cName')):'';
  window.location.href='mailto:'+DATA.email+'?subject='+encodeURIComponent(DATA.model+' build'+cust)+'&body='+encodeURIComponent(summaryText());
}
document.getElementById('emailBtn').onclick=async(e)=>{
  const btn=e.target, sent=document.getElementById('sent');
  const cust=val('cName')?(' — '+val('cName')):'';
  const payload={_subject:DATA.model+' build'+cust, _template:'box',
    name:val('cName')||'(not given)', email:val('cEmail')||'(not given)', phone:val('cPhone')||'(not given)',
    notes:val('cNotes')||'', total:document.getElementById('hTotal').textContent, message:summaryText()};
  btn.disabled=true; btn.textContent='Sending…'; sent.className='';
  try{
    const res=await fetch('https://formsubmit.co/ajax/'+encodeURIComponent(DATA.email),
      {method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify(payload)});
    const j=await res.json().catch(()=>({}));
    if(j && (j.success===true||String(j.success)==='true')){
      sent.className='ok'; sent.textContent='✓ Sent to Mason — he\'ll follow up with you.'; btn.textContent='Sent ✓';
    } else {
      sent.className='ok'; sent.textContent='✓ Build submitted. (First-time setup: Mason confirms the inbox once.)'; btn.textContent='Sent ✓';
    }
  }catch(err){
    sent.className='err'; sent.innerHTML='Couldn\'t reach the server — opening your email app instead…';
    btn.disabled=false; btn.textContent='Send to Mason'; mailtoFallback();
  }
};
render();
</script></body></html>
