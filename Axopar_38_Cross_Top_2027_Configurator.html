<style>

*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-text-size-adjust:100%}

header.bar{position:sticky;top:0;z-index:20;background:var(--brand);color:#fff;border-radius:0 0 12px 12px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.barin{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;max-width:820px;margin:0 auto}
.barin h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px}
.barin .sub{font-size:12px;opacity:.85;margin-top:2px}
.tot{text-align:right;white-space:nowrap}
.tot .lbl{font-size:11px;opacity:.85}
.tot .val{font-size:22px;font-weight:700}
.sec{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden}
.sechd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.sechd h2{font-size:15px;margin:0;font-weight:600}
.sechd .meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.pill{font-size:11px;color:var(--brand);background:#e9f1f9;padding:2px 9px;border-radius:20px;font-weight:600}
.pill.req{color:#b3261e;background:#fdecea}
.pill.ok{color:var(--ok);background:#e7f6ee}
.fuelhint{font-size:12px;color:var(--brand);background:#eef4fb;padding:9px 16px;border-top:1px solid var(--line)}
.fit{display:inline-block;font-size:11px;color:var(--ok);background:#e7f6ee;border-radius:10px;padding:1px 8px;margin-left:6px;font-weight:600}
.footmsg{display:none;background:var(--warnbg);color:var(--warn);font-size:13px;font-weight:600;padding:7px 16px;text-align:center;border-bottom:1px solid #f0d999}
.sec.flash{border-color:#b3261e;box-shadow:0 0 0 2px rgba(179,38,30,.25)}
.chev{transition:transform .18s;color:var(--muted)}
.sec.collapsed .body{display:none}
.sec.collapsed .chev{transform:rotate(-90deg)}
.opt{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-top:1px solid var(--line)}
.opt:hover{background:#fafbfc}

.opt .nm{flex:1;font-size:14px;line-height:1.35}
.opt .note{font-size:12px;color:var(--muted);margin-top:2px}
.opt .note.req{color:var(--warn)}
.opt.sel .warn{display:block}
.opt .warn{display:none;font-size:12px;color:var(--warn);background:var(--warnbg);border-radius:6px;padding:3px 8px;margin-top:4px}
.opt .pr{font-size:14px;font-weight:600;white-space:nowrap;min-width:74px;text-align:right}
.opt .pr.inc{color:var(--ok);font-weight:500}
.locked{background:#f0f7f0}
.foot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -2px 10px rgba(0,0,0,.06);z-index:30}
.footin{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px}
.footin .c{font-size:12px;color:var(--muted)}
.footin .t{font-size:20px;font-weight:700}
.btn{appearance:none;border:1px solid var(--brand);background:var(--brand);color:#fff;font-size:14px;font-weight:600;padding:11px 16px;border-radius:10px;cursor:pointer}
.btn.ghost{background:#fff;color:var(--brand)}
.btn:active{transform:scale(.98)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;overflow:auto}
.modal.open{display:block}
.sheet{background:#fff;max-width:760px;margin:24px auto;border-radius:14px;padding:20px}
.sheet h2{margin:0 0 2px;font-size:19px}
.sheet .ssub{color:var(--muted);font-size:13px;margin-bottom:14px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 16px}
.fields label{font-size:12px;color:var(--muted);display:block;margin-bottom:3px}
.fields input{width:100%;font-size:14px;padding:9px 10px;border:1px solid var(--line);border-radius:8px}
.sumtbl{width:100%;border-collapse:collapse;font-size:13px}
.sumtbl td{padding:5px 0;vertical-align:top}
.sumtbl .scat{font-weight:600;color:var(--brand);padding-top:12px;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.sumtbl .amt{text-align:right;white-space:nowrap}
.sumtbl tr.grand td{border-top:2px solid var(--ink);font-weight:700;font-size:16px;padding-top:10px}
.acts{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.acts .btn{flex:1;min-width:150px;text-align:center}
.close{float:right;border:none;background:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
#sent{display:none;margin-top:14px;padding:12px 14px;border-radius:10px;font-size:14px}
#sent.ok{display:block;background:#e7f6ee;color:var(--ok);border:1px solid #b7e3cd}
#sent.err{display:block;background:var(--warnbg);color:var(--warn);border:1px solid #f0d999}
@media(max-width:560px){.fields{grid-template-columns:1fr}.barin h1{font-size:15px}.tot .val{font-size:18px}}
@media print{body{background:#fff}.foot,header.bar,.wrap,.close,.acts,.fields{display:none!important}.modal,.modal .sheet{position:static;background:#fff;margin:0;display:block;max-width:100%;box-shadow:none}.modal{overflow:visible}}
.printhdr{display:none}
@media print{.printhdr{display:block;margin-bottom:14px;border-bottom:2px solid var(--brand);padding-bottom:8px}.printhdr .pm{font-size:18px;font-weight:700}.printhdr .pc{font-size:12px;color:#444}}

      const ctrl = s.type==='base' ? '<input type="checkbox" checked disabled>'
        : '<input type="'+(s.type==='single'?'radio':'checkbox')+'" '+(s.type==='single'?'name="g'+si+'"':'')+(on?' checked':'')+'>';
      const priceTxt = '<span class="pr">'+(s.type==='base'?fmt(o.price):(o.price>0?'+'+fmt(o.price):'$0'))+'</span>';
      const needsWarn = /not compatible|not available|\S+\s+required/i.test(o.note);
      const note = o.note ? '<div class="note'+(isReq(o.note)?' req':'')+'">'+esc(o.note)+'</div>' : '';
      const warn = needsWarn ? '<div class="warn">&#9888; '+esc(o.note)+'</div>' : '';
      const fm = (s.name==='Fuel System')?fuelMatch(o.name):null;
      const fit = fm===true ? '<span class="fit">&#10003; fits your engine</span>' : '';
      row.innerHTML = ctrl+'<div class="nm">'+esc(o.name)+fit+note+warn+'</div>'+priceTxt;
      const input=row.querySelector('input');
      if(s.type!=='base') input.addEventListener('change',()=>{
        if(s.type==='single'){ s.options.forEach((_,k)=>delete sel[si+'_'+k]); sel[id]=true; }
        else { if(input.checked) sel[id]=true; else delete sel[id]; }
        render(); recompute();
      });
      body.appendChild(row);
    });
    sec.querySelector('.sechd').addEventListener('click',e=>{ if(e.target.closest('.opt'))return; collapsedState[si]=!collapsedState[si]; sec.classList.toggle('collapsed'); });
    root.appendChild(sec);
  });
  recompute();
}
function items(){
  const out=[];
  DATA.sections.forEach((s,si)=>s.options.forEach((o,oi)=>{ if(sel[si+'_'+oi]) out.push({cat:s.name,name:o.name,price:o.price}); }));
  return out;
}
function recompute(){
  const it=items(); const total=it.reduce((a,b)=>a+b.price,0);
  document.getElementById('hTotal').textContent=fmt(total);
  document.getElementById('fTotal').textContent=fmt(total);
  document.getElementById('fCount').textContent=it.filter(x=>DATA.sections[0].name!==x.cat).length;
  const m=document.getElementById('footMsg'); if(m && hasEngine()){ m.style.display='none'; }
}
function buildSummary(){
  const it=items(); const tbody=document.getElementById('sumBody'); tbody.innerHTML='';
  let cat=''; let total=0;
  it.forEach(x=>{
    if(x.cat!==cat){ cat=x.cat; const tr=document.createElement('tr'); tr.innerHTML='<td class="scat" colspan="2">'+esc(cat)+'</td>'; tbody.appendChild(tr); }
    total+=x.price;
    const tr=document.createElement('tr'); tr.innerHTML='<td>'+esc(x.name)+'</td><td class="amt">'+fmt(x.price)+'</td>'; tbody.appendChild(tr);
  });
  const g=document.createElement('tr'); g.className='grand'; g.innerHTML='<td>Total (USD)</td><td class="amt">'+fmt(total)+'</td>'; tbody.appendChild(g);
  return total;
}
function summaryText(){
  const it=items(); let total=0; let cat=''; let lines=[];
  it.forEach(x=>{ if(x.cat!==cat){cat=x.cat; lines.push('');lines.push('— '+cat.toUpperCase()+' —');} total+=x.price; lines.push(x.name+'  ...  '+fmt(x.price)); });
  const cust=[];
  const n=val('cName'),p=val('cPhone'),e=val('cEmail'),no=val('cNotes');
  if(n)cust.push('Name: '+n); if(p)cust.push('Phone: '+p); if(e)cust.push('Email: '+e); if(no)cust.push('Notes: '+no);
  return DATA.model+' — Build Summary\nSurdyke Yamaha & Marina\n'+(cust.length?'\n'+cust.join('\n')+'\n':'')+lines.join('\n')+'\n\nTOTAL (USD): '+fmt(total);
}
function val(id){return (document.getElementById(id).value||'').trim();}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function flagEngineRequired(){
  const sec=[...document.querySelectorAll('.sec')].find(s=>s.querySelector('h2').textContent==='Engine');
  if(sec){ const si=[...document.querySelectorAll('.sec')].indexOf(sec); sec.classList.remove('collapsed');
    sec.classList.add('flash'); sec.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>sec.classList.remove('flash'),1700); }
  const m=document.getElementById('footMsg'); if(m){ m.textContent='⚠ Select an engine to finish your build.'; m.style.display='block'; }
}
document.getElementById('finishBtn').onclick=()=>{
  if(!hasEngine()){ flagEngineRequired(); return; }
  buildSummary(); document.getElementById('modal').classList.add('open');
};
document.getElementById('closeBtn').onclick=document.getElementById('backBtn').onclick=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('printBtn').onclick=()=>window.print();
function mailtoFallback(){
  const cust=val('cName')?(' — '+val('cName')):'';
  window.location.href='mailto:'+DATA.email+'?subject='+encodeURIComponent(DATA.model+' build'+cust)+'&body='+encodeURIComponent(summaryText());
}
document.getElementById('emailBtn').onclick=async(e)=>{
  const btn=e.target, sent=document.getElementById('sent');
  const cust=val('cName')?(' — '+val('cName')):'';
  const payload={_subject:DATA.model+' build'+cust, _template:'box',
    name:val('cName')||'(not given)', email:val('cEmail')||'(not given)', phone:val('cPhone')||'(not given)',
    notes:val('cNotes')||'', total:document.getElementById('hTotal').textContent, message:summaryText()};
  btn.disabled=true; btn.textContent='Sending…'; sent.className='';
  try{
    const res=await fetch('https://formsubmit.co/ajax/'+encodeURIComponent(DATA.email),
      {method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},body:JSON.stringify(payload)});
    const j=await res.json().catch(()=>({}));
    if(j && (j.success===true||String(j.success)==='true')){
      sent.className='ok'; sent.textContent='✓ Sent to Mason — he\'ll follow up with you.'; btn.textContent='Sent ✓';
    } else {
      sent.className='ok'; sent.textContent='✓ Build submitted. (First-time setup: Mason confirms the inbox once.)'; btn.textContent='Sent ✓';
    }
  }catch(err){
    sent.className='err'; sent.innerHTML='Couldn\'t reach the server — opening your email app instead…';
    btn.disabled=false; btn.textContent='Send to Mason'; mailtoFallback();
  }
};
render();
</script></body></html>
